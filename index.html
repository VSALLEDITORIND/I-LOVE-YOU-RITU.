<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রিতু - আমার চিরকালের ভালোবাসা</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Hind+Siliguri:wght@400;700&display=swap');

        body {
            background: #000; /* Dark premium look */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Hind Siliguri', sans-serif;
            overflow: hidden;
        }

        /* God Level Animated Background */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,45,85,0.2) 0%, rgba(0,0,0,1) 80%);
            z-index: -1;
        }

        #main-card {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            padding: 40px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 50px rgba(255, 45, 85, 0.4);
            width: 85%;
            max-width: 400px;
            position: relative;
            transition: 0.5s;
        }

        #title {
            color: #fff;
            font-family: 'Pacifico', cursive;
            font-size: 28px;
            text-shadow: 0 0 15px #ff2d55;
            margin-bottom: 20px;
        }

        /* Next Gen Heart Image Frame */
        #love-frame {
            display: none;
            width: 250px;
            height: 250px;
            margin: 20px auto;
            position: relative;
            animation: heartbeat 1s infinite alternate;
        }

        #love-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Ultra Sharp Heart Shape */
            clip-path: path('M12 21.65l-1.45-1.32C5.4 15.66 2 12.58 2 8.8c0-3.08 2.42-5.5 5.5-5.5 1.74 0 3.41.81 4.5 2.09C13.09 4.11 14.76 3.3 16.5 3.3c3.08 0 5.5 2.42 5.5 5.5 0 3.78-3.4 6.86-8.55 11.54L12 21.65z');
            transform: scale(11);
            transform-origin: top left;
            border: 2px solid #ff2d55;
        }

        @keyframes heartbeat {
            to { transform: scale(1.08); filter: drop-shadow(0 0 20px #ff2d55); }
        }

        .cat-gif { width: 180px; border-radius: 20px; margin-bottom: 20px; }

        .btn-container { display: flex; flex-direction: column; gap: 15px; align-items: center; }

        .yes-btn {
            background: #ff2d55;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 45, 85, 0.4);
            transition: 0.3s;
        }

        .no-btn {
            background: transparent;
            color: #ccc;
            border: 1px solid #555;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
        }

        .success-text {
            display: none;
            color: #ff2d55;
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
            text-shadow: 0 0 10px rgba(255,45,85,0.5);
        }

        .heart-particle {
            position: absolute;
            pointer-events: none;
            animation: floatUp 4s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div id="main-card">
    <h1 id="title">প্রিয় রিতু, <br> তুমি কি আমার হবে?</h1>
    
    <div id="initial-content">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHJpYjR4eHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/c76IJLufpNwSULPk2m/giphy.gif" class="cat-gif">
        <div class="btn-container">
            <button class="yes-btn" onclick="activateGodMode()">হ্যাঁ, সারপ্রাইজটি দেখাও!</button>
            <button class="no-btn" id="noBtn" onmouseover="moveNo()">না</button>
        </div>
    </div>

    <div id="love-frame">
        <img src="./1000426483.jpg" onerror="this.src='https://via.placeholder.com/250?text=Photo+Error'">
    </div>

    <p id="final-msg" class="success-text">আমি তোমাকে অনেক ভালোবাসি রিতু! ❤️<br>তুমিই আমার পুরো পৃথিবী।</p>
</div>

<script>
    function activateGodMode() {
        // UI Transformation
        document.getElementById('initial-content').style.display = 'none';
        document.getElementById('love-frame').style.display = 'block';
        document.getElementById('final-msg').style.display = 'block';
        document.getElementById('title').innerText = "আই লাভ ইউ রিতু!";
        document.getElementById('main-card').style.background = "rgba(255, 255, 255, 0.15)";

        // Start Infinite Heart Particles
        setInterval(createParticle, 150);

        // God Level Voice Sync
        playVoice();
    }

    function playVoice() {
        const synth = window.speechSynthesis;
        const text = "আমি তোমাকে অনেক ভালোবাসি রিতু। তুমি আমার সব কিছু এবং তুমিই আমার পুরো পৃথিবী। আই লাভ ইউ সো মাচ।";
        const utter = new SpeechSynthesisUtterance(text);
        
        utter.lang = 'bn-BD'; 
        utter.rate = 0.8;
        utter.pitch = 1.1;

        // ব্রাউজার যদি ভয়েস সাপোর্ট না করে তবে ইংরেজি ফলব্যাক
        utter.onerror = () => {
            utter.lang = 'en-US';
            utter.text = "I love you Ritu. You are my everything and my whole world.";
            synth.speak(utter);
        };

        window.speechSynthesis.cancel(); // আগের কোনো ভয়েস থাকলে বন্ধ করবে
        synth.speak(utter);
    }

    function createParticle() {
        const heart = document.createElement('div');
        heart.classList.add('heart-particle');
        heart.innerHTML = ["❤️", "💖", "✨", "🌸", "💍"][Math.floor(Math.random() * 5)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 15) + "px";
        heart.style.animationDuration = (Math.random() * 2 + 2) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 4000);
    }

    function moveNo() {
        const btn = document.getElementById('noBtn');
        btn.style.position = 'fixed';
        btn.style.left = Math.random() * 80 + 'vw';
        btn.style.top = Math.random() * 80 + 'vh';
        document.getElementById('title').innerText = "না বলা যাবে না! 😉";
    }
</script>

</body>
</html>
