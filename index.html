<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>রিতু - আমার চিরকালের ভালোবাসা</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Hind+Siliguri:wght@400;700&display=swap');

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Hind Siliguri', sans-serif;
            overflow: hidden;
        }

        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,45,85,0.3) 0%, rgba(0,0,0,1) 80%);
            z-index: -1;
        }

        #main-card {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 40px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 50px rgba(255, 45, 85, 0.5);
            width: 85%;
            max-width: 400px;
        }

        #title {
            color: #fff;
            font-family: 'Pacifico', cursive;
            font-size: 28px;
            text-shadow: 0 0 15px #ff2d55;
            margin-bottom: 20px;
        }

        /* 📸 হার্ট শেপ ফটো ফ্রেম (God Level) */
        #love-frame {
            display: none;
            width: 250px;
            height: 250px;
            margin: 20px auto;
            position: relative;
            animation: heartbeat 1s infinite alternate;
        }

        #love-frame .heart-mask {
            width: 100%;
            height: 100%;
            background: #fff;
            /* নিখুঁত হার্ট শেপ ক্লিপ */
            clip-path: url(#heartPath); 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #love-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* ইমেজের ওপর হার্ট শেপ অ্যাপ্লাই */
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            transform: scale(11); 
            transform-origin: top left;
        }

        @keyframes heartbeat {
            to { transform: scale(1.1); filter: drop-shadow(0 0 25px #ff2d55); }
        }

        .cat-gif { width: 160px; border-radius: 20px; margin-bottom: 20px; }

        .btn-container { display: flex; flex-direction: column; gap: 15px; align-items: center; }

        .yes-btn {
            background: #ff2d55;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 45, 85, 0.4);
        }

        .success-text {
            display: none;
            color: #ff2d55;
            font-size: 22px;
            font-weight: bold;
            margin-top: 20px;
        }

        .heart-particle {
            position: absolute;
            pointer-events: none;
            animation: floatUp 4s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div id="main-card">
    <h1 id="title">প্রিয় রিতু, <br> তুমি কি আমার হবে?</h1>
    
    <div id="initial-content">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHJpYjR4eHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/c76IJLufpNwSULPk2m/giphy.gif" class="cat-gif">
        <div class="btn-container">
            <button class="yes-btn" onclick="activateLove()">হ্যাঁ, সারপ্রাইজটি দেখাও!</button>
        </div>
    </div>

    <div id="love-frame">
        <img src="./1000426483.jpg" onerror="this.src='https://via.placeholder.com/250?text=Ritu'">
    </div>

    <p id="final-msg" class="success-text">আই লাভ ইউ সো মাচ রিতু! ❤️</p>
</div>

<script>
    function activateLove() {
        // UI আপডেট
        document.getElementById('initial-content').style.display = 'none';
        document.getElementById('love-frame').style.display = 'block';
        document.getElementById('final-msg').style.display = 'block';
        document.getElementById('title').innerText = "তুমি আমার পুরো পৃথিবী!";

        // হার্ট পার্টিকলস শুরু
        setInterval(createParticle, 150);

        // ভয়েস শুরু (User interaction এর পর)
        playVoice();
    }

    function playVoice() {
        const synth = window.speechSynthesis;
        const text = "আমি তোমাকে অনেক ভালোবাসি রিতু। তুমি আমার সবকিছু এবং তুমিই আমার পুরো পৃথিবী। আই লাভ ইউ সো মাচ।";
        const utter = new SpeechSynthesisUtterance(text);
        
        utter.lang = 'bn-BD'; 
        utter.rate = 0.8;
        utter.pitch = 1.1;

        synth.cancel(); 
        synth.speak(utter);
    }

    function createParticle() {
        const heart = document.createElement('div');
        heart.classList.add('heart-particle');
        heart.innerHTML = ["❤️", "💖", "✨", "💍"][Math.floor(Math.random() * 4)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 15) + "px";
        heart.style.animationDuration = (Math.random() * 2 + 2) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 4000);
    }
</script>

</body>
</html>
