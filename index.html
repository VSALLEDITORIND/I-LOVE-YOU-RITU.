<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Life Ritu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;700&display=swap');

        body {
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fad0c4, #ff9a9e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #main-card {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            width: 85%;
            max-width: 380px;
            z-index: 10;
        }

        #title {
            color: #ff2d55;
            font-family: 'Pacifico', cursive;
            font-size: 28px;
        }

        /* Improved Heart Frame */
        #love-frame {
            display: none;
            width: 200px;
            height: 200px;
            margin: 20px auto;
            position: relative;
            animation: heartbeat 1.2s infinite;
        }

        #love-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%; /* Circle fallback if heart fails */
            border: 5px solid #ff2d55;
            mask-image: url('https://upload.wikimedia.org/wikipedia/commons/4/42/Love_Heart_SVG.svg');
            -webkit-mask-image: url('https://upload.wikimedia.org/wikipedia/commons/4/42/Love_Heart_SVG.svg');
            mask-size: contain;
            -webkit-mask-size: contain;
            mask-repeat: no-repeat;
            -webkit-mask-repeat: no-repeat;
            mask-position: center;
            -webkit-mask-position: center;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .cat-gif { width: 150px; border-radius: 15px; }

        .btn-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .action-btn { width: 70px; cursor: pointer; transition: 0.3s; }

        .success-text {
            display: none;
            color: #ff2d55;
            font-family: 'Pacifico', cursive;
            font-size: 24px;
            margin-top: 15px;
        }

        .floating-heart {
            position: absolute;
            pointer-events: none;
            animation: floatUp 4s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="main-card">
    <h1 id="title">Hey Queen Ritu, <br> Will you be my Valentine?</h1>
    
    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHJpYjR4eHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/c76IJLufpNwSULPk2m/giphy.gif" 
         class="cat-gif" id="display-gif">

    <div id="love-frame">
        <img src="1000426483.jpg" onerror="this.src='https://via.placeholder.com/200?text=Photo+Not+Found'">
    </div>

    <div class="btn-container" id="btns">
        <img src="https://cdn-icons-png.flaticon.com/512/5291/5291043.png" class="action-btn" onclick="startCelebration()">
        <img src="https://cdn-icons-png.flaticon.com/512/5291/5291039.png" class="action-btn" id="noBtn" onmouseover="dodgeButton()">
    </div>

    <p id="success-msg" class="success-text">I LOVE YOU RITU ❤️<br>You are my Everything!</p>
</div>

<script>
    function startCelebration() {
        document.getElementById('title').innerText = "Ritu, I Love You!";
        document.getElementById('display-gif').style.display = 'none';
        document.getElementById('btns').style.display = 'none';
        document.getElementById('love-frame').style.display = 'block';
        document.getElementById('success-msg').style.display = 'block';

        setInterval(spawnHeart, 300);
        
        // Voice Message Update
        const speakText = "I Love You Ritu. You are my everything and my whole world.";
        const utter = new SpeechSynthesisUtterance(speakText);
        utter.lang = 'en-US';
        utter.rate = 0.8;
        window.speechSynthesis.speak(utter);
    }

    function spawnHeart() {
        const heart = document.createElement('div');
        heart.classList.add('floating-heart');
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 2 + 2) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 3000);
    }

    function dodgeButton() {
        const btn = document.getElementById('noBtn');
        btn.style.position = 'fixed';
        btn.style.left = Math.random() * 80 + 'vw';
        btn.style.top = Math.random() * 80 + 'vh';
        document.getElementById('title').innerText = "না বলা বারণ! 😉";
    }
</script>

</body>
</html>
