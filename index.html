<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Queen Ritu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;700&display=swap');

        :root {
            --primary: #ff2d55;
            --secondary: #ff85a1;
            --white: rgba(255, 255, 255, 0.9);
        }

        body {
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fad0c4, #ff9a9e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Container */
        #main-card {
            text-align: center;
            background: var(--white);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            width: 90%;
            max-width: 400px;
            z-index: 10;
            position: relative;
            transition: all 0.5s ease;
        }

        #title {
            color: var(--primary);
            font-family: 'Pacifico', cursive;
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .cat-gif {
            width: 180px;
            border-radius: 20px;
            margin: 10px 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Magic Heart Frame */
        .photo-result {
            display: none;
            position: relative;
            width: 250px;
            height: 250px;
            margin: 20px auto;
            clip-path: path('M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z');
            background: var(--primary);
            animation: pulse 1.5s infinite;
        }

        .photo-result img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px #ff2d55); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 20px #ff2d55); }
            100% { transform: scale(1); filter: drop-shadow(0 0 5px #ff2d55); }
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 30px;
        }

        .action-btn {
            width: 80px;
            height: 80px;
            cursor: pointer;
            transition: all 0.3s;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .action-btn:hover {
            transform: scale(1.2) rotate(5deg);
        }

        .success-text {
            display: none;
            color: var(--primary);
            font-family: 'Pacifico', cursive;
            font-size: 28px;
            margin-top: 20px;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Floating Hearts */
        .floating-heart {
            position: absolute;
            font-size: 20px;
            color: #ff4d6d;
            pointer-events: none;
            z-index: 1;
            animation: floatUp 4s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="main-card">
    <h1 id="title">Hey Queen Ritu, <br> Will you be my Valentine?</h1>
    
    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHJpYjR4eHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxeHpxJmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/c76IJLufpNwSULPk2m/giphy.gif" 
         class="cat-gif" id="display-gif">

    <div id="love-frame" class="photo-result">
        <img src="1000426483.jpg" alt="Our Love">
    </div>

    <div class="btn-container" id="btns">
        <img src="https://cdn-icons-png.flaticon.com/512/5291/5291043.png" class="action-btn" onclick="startCelebration()">
        <img src="https://cdn-icons-png.flaticon.com/512/5291/5291039.png" class="action-btn" id="noBtn" onmouseover="dodgeButton()">
    </div>

    <p id="success-msg" class="success-text">I LOVE YOU RITU ❤️</p>
</div>

<script>
    const synth = window.speechSynthesis;

    function startCelebration() {
        // Hide initial elements
        document.getElementById('title').innerText = "You Made My Day!";
        document.getElementById('display-gif').style.display = 'none';
        document.getElementById('btns').style.display = 'none';

        // Show result
        document.getElementById('love-frame').style.display = 'block';
        document.getElementById('success-msg').style.display = 'block';

        // Effects
        setInterval(spawnHeart, 200);
        
        // Premium Voice
        const welcomeMessage = new SpeechSynthesisUtterance("I Love You Ritu. You are my world and my forever Valentine.");
        welcomeMessage.lang = 'en-US';
        welcomeMessage.rate = 0.85;
        welcomeMessage.pitch = 1.1;
        synth.speak(welcomeMessage);
    }

    function spawnHeart() {
        const heart = document.createElement('div');
        heart.classList.add('floating-heart');
        heart.innerHTML = ["❤️", "💖", "💝", "🌸"][Math.floor(Math.random() * 4)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (Math.random() * 2 + 3) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 4000);
    }

    function dodgeButton() {
        const btn = document.getElementById('noBtn');
        const card = document.getElementById('main-card');
        
        // Moves the button randomly within the screen
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 100);
        
        btn.style.position = 'fixed';
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
        
        document.getElementById('title').innerText = "না বলা বারণ! 😉";
    }

    // Initial floating hearts
    setInterval(spawnHeart, 1000);
</script>

</body>
</html>
